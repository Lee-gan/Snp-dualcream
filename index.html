<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Snp Dual Cream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-gradient: radial-gradient(circle at 50% 0%, #fef2f2 0%, #fdf4ff 50%, #f0f9ff 100%);
      --primary-gradient: linear-gradient(135deg, #d946ef, #ec4899, #06b6d4);
      --text-color: #334155;
      --safe-area-top: env(safe-area-inset-top, 20px);
      --safe-area-bottom: env(safe-area-inset-bottom, 20px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text-color);
    }

    .mobile-container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg-gradient);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: calc(var(--safe-area-top) + 24px) 20px calc(var(--safe-area-bottom) + 28px);
      overflow: hidden;
      text-align: center;
    }

    .header-section {
      width: 100%;
      z-index: 10;
      margin-bottom: 14px;
    }

    .question {
      font-size: clamp(1.9rem, 8vw, 2.5rem);
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: -0.03em;
      word-break: keep-all;
      overflow-wrap: break-word;
      transition: opacity 0.35s ease;
      background: linear-gradient(to bottom, #1e293b, #475569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .product-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      margin: 2px 0 16px;
      min-height: 390px;
      flex: 1;
    }

    .glow-effect {
      position: absolute;
      width: 270px;
      height: 270px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.22) 0%, rgba(6, 182, 212, 0.14) 45%, transparent 72%);
      filter: blur(36px);
      z-index: 1;
      opacity: 0.72;
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    .product-image {
      position: relative;
      display: block;
      width: min(86vw, 330px);
      max-width: 330px;
      min-width: 210px;
      height: auto;
      max-height: 40vh;
      object-fit: contain;
      margin: 0 auto;
      border-radius: 24px;
      filter: drop-shadow(0 18px 36px rgba(236, 72, 153, 0.18));
      animation: float 6s ease-in-out infinite;
      z-index: 2;
    }

    .button-area {
      width: 100%;
      max-width: 340px;
      height: 180px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
      margin-top: auto;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      user-select: none;
      touch-action: manipulation;
      letter-spacing: 0.04em;
    }

    .btn-buy {
      padding: 16px 42px;
      min-width: 140px;
      font-size: 1.15rem;
      color: white;
      background: var(--primary-gradient);
      border-radius: 999px;
      box-shadow:
        0 10px 25px rgba(236, 72, 153, 0.26),
        inset 0 -4px 10px rgba(0,0,0,0.08),
        inset 0 4px 10px rgba(255,255,255,0.35);
      position: relative;
      z-index: 30;
    }

    .btn-no {
      position: relative;
      padding: 16px 42px;
      min-width: 140px;
      font-size: 1.15rem;
      color: #475569;
      background: rgba(255,255,255,0.86);
      border: 1px solid #e2e8f0;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      z-index: 40;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
    }

    .modal-content {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(255,255,255,0.6);
      padding: 32px 24px;
      border-radius: 28px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.14);
      text-align: center;
      max-width: 310px;
      width: 100%;
    }

    .modal-text {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 20px;
      line-height: 1.45;
      color: #1e293b;
      word-break: keep-all;
    }

    .modal-btn {
      padding: 13px 42px;
      background: var(--primary-gradient);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 800;
      font-size: 1rem;
      box-shadow: 0 10px 25px rgba(236, 72, 153, 0.25);
      cursor: pointer;
    }

    .touch-pointer {
      position: fixed;
      width: 26px;
      height: 26px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-4px, -2px) scale(0.9);
      opacity: 0;
      animation: pointerPop 0.6s ease forwards;
    }

    .touch-pointer::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 12px solid white;
      border-top: 18px solid transparent;
      border-bottom: 6px solid transparent;
      transform: rotate(-18deg);
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.22));
    }

    .touch-pointer::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 13px;
      width: 9px;
      height: 2px;
      background: #334155;
      transform: rotate(38deg);
      border-radius: 2px;
    }

    @keyframes pointerPop {
      0% {
        opacity: 0;
        transform: translate(-4px, -2px) scale(0.7);
      }
      20% {
        opacity: 1;
        transform: translate(-4px, -2px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-4px, -2px) scale(1.08);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.72; }
      50% { transform: scale(1.14); opacity: 0.45; }
    }

    @media (max-width: 380px) {
      .question {
        font-size: clamp(1.7rem, 7.2vw, 2.1rem);
      }

      .product-container {
        min-height: 340px;
      }

      .product-image {
        width: min(82vw, 290px);
        max-width: 290px;
        min-width: 190px;
        max-height: 36vh;
        border-radius: 20px;
      }

      .btn-buy,
      .btn-no {
        min-width: 126px;
        padding: 14px 30px;
        font-size: 1.05rem;
      }

      .button-area {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="mobile-container">
    <div class="header-section">
      <h1 id="question" class="question">このデュアルクリーム…<br>本当に買わないの？</h1>
    </div>

    <div class="product-container">
      <div id="glow" class="glow-effect"></div>
      <img id="productImg" src="https://i.ifh.cc/Kx6wFA.jpg" alt="Snp Dual Cream" class="product-image">
    </div>

    <div id="buttonArea" class="button-area">
      <button id="buyBtn" class="btn btn-buy">BUY</button>
      <button id="noBtn" class="btn btn-no">NO</button>
    </div>
  </div>

  <div id="modal" class="modal-overlay">
    <div class="modal-content">
      <p class="modal-text">結局BUY😎<br>賢い選択です！</p>
      <button id="modalBtn" class="modal-btn">OK</button>
    </div>
  </div>

  <script>
    const question = document.getElementById('question');
    const buyBtn = document.getElementById('buyBtn');
    const noBtn = document.getElementById('noBtn');
    const buttonArea = document.getElementById('buttonArea');
    const glow = document.getElementById('glow');
    const modal = document.getElementById('modal');
    const modalBtn = document.getElementById('modalBtn');

    let escapeCount = 0;
    let buyScale = 1;
    const maxEscapes = 5;
    const redirectUrl = "https://m.qoo10.jp/g/1044939603";

    const randomTexts = [
      "後悔しない自信ある？",
      "この価格、<br>もう出なくても大丈夫？",
      "本当に最後の<br>チャンスかも"
    ];

    function showTouchPointer(x, y) {
      const pointer = document.createElement('div');
      pointer.className = 'touch-pointer';
      pointer.style.left = `${x}px`;
      pointer.style.top = `${y}px`;
      document.body.appendChild(pointer);

      setTimeout(() => {
        pointer.remove();
      }, 600);
    }

    function moveNoButton() {
      if (escapeCount >= maxEscapes) return;

      if (escapeCount === 0) {
        noBtn.style.position = 'absolute';
      }

      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = Math.max(0, areaRect.width - btnRect.width);
      const maxY = Math.max(0, areaRect.height - btnRect.height);

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      setTimeout(() => {
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;

        escapeCount++;

        buyScale += 0.08;
        const currentScale = Math.min(buyScale, 1.45);
        buyBtn.style.transform = `scale(${currentScale})`;

        if (escapeCount >= 3) {
          const randomText = randomTexts[Math.floor(Math.random() * randomTexts.length)];
          question.style.opacity = '0';
          setTimeout(() => {
            question.innerHTML = randomText;
            question.style.opacity = '1';
          }, 180);
        }

        if (escapeCount >= maxEscapes) {
          noBtn.style.transition = 'opacity 0.4s ease';
          noBtn.style.opacity = '0';
          noBtn.style.pointerEvents = 'none';

          setTimeout(() => {
            noBtn.style.display = 'none';
            buyBtn.style.transform = 'scale(1.6)';
            glow.style.transform = 'scale(1.45)';
            glow.style.opacity = '0.95';
          }, 280);
        }
      }, 140);
    }

    noBtn.addEventListener('pointermove', (e) => {
      if (e.pointerType === 'mouse') moveNoButton();
    });

    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      if (touch) {
        showTouchPointer(touch.clientX, touch.clientY);
      }
      moveNoButton();
    }, { passive: false });

    document.addEventListener('click', (e) => {
      showTouchPointer(e.clientX, e.clientY);
    });

    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      if (!touch) return;
      showTouchPointer(touch.clientX, touch.clientY);
    }, { passive: true });

    buyBtn.addEventListener('click', () => {
      modal.style.display = 'flex';
    });

    modalBtn.addEventListener('click', () => {
      window.location.href = redirectUrl;
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        window.location.href = redirectUrl;
      }
    });
  </script>
</body>
</html>
  </script>
</body>
</html>
